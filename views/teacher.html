<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><title>Espace Enseignant</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header><h1>BRAIN VISION // Enseignant</h1><button onclick="logout()" style="width:auto;">Déconnexion</button></header>
  <main class="grid-dashboard">
    <div>
      <div class="card">
        <h2>1. Créer un Cours</h2>
        <form id="coursForm">
          <input type="text" id="tCours" placeholder="Titre du cours" required>
          <textarea id="dCours" placeholder="Description..."></textarea>
          <select id="selMod" required><option value="">-- Choisir un Module --</option></select>
          <button type="submit">Créer</button>
        </form>
      </div>
      <div class="card">
        <h2>2. Ajouter une Leçon + Évaluation</h2>
        <form id="leconForm">
          <select id="selCours" required><option value="">-- Choisir le Cours --</option></select>
          <input type="text" id="tLec" placeholder="Titre leçon" required>
          <select id="tCont"><option value="pdf">Document PDF</option><option value="video">Vidéo</option></select>
          <input type="file" id="f" required>
          <input type="text" id="q" placeholder="Question de validation" required>
          <input type="text" id="oA" placeholder="Option A" required>
          <input type="text" id="oB" placeholder="Option B" required>
          <input type="text" id="oC" placeholder="Option C" required>
          <select id="rC"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
          <button type="submit">Publier la leçon</button>
        </form>
      </div>
    </div>
    <div class="card"><h2>Vos publications</h2><div id="cList"></div></div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    async function load() {
      const [m, c] = await Promise.all([apiRequest('/api/modules'), apiRequest('/api/cours')]);
      document.getElementById('selMod').innerHTML += m.map(x => `<option value="${x.id}">${x.nom}</option>`).join('');
      document.getElementById('selCours').innerHTML += c.map(x => `<option value="${x.id}">${x.titre}</option>`).join('');
      document.getElementById('cList').innerHTML = c.map(x => `<div class="list-item"><strong>${x.titre}</strong><span class="badge">${x.module_nom}</span></div>`).join('');
    }
    document.getElementById('coursForm').addEventListener('submit', async(e)=>{
      e.preventDefault();
      await apiRequest('/api/cours', 'POST', {titre: document.getElementById('tCours').value, description: document.getElementById('dCours').value, module_id: document.getElementById('selMod').value});
      window.location.reload();
    });
    document.getElementById('leconForm').addEventListener('submit', async(e)=>{
      e.preventDefault();
      const fd = new FormData();
      fd.append('cours_id', document.getElementById('selCours').value);
      fd.append('titre', document.getElementById('tLec').value);
      fd.append('type_contenu', document.getElementById('tCont').value);
      fd.append('fichier', document.getElementById('f').files[0]);
      fd.append('question', document.getElementById('q').value);
      fd.append('option_a', document.getElementById('oA').value);
      fd.append('option_b', document.getElementById('oB').value);
      fd.append('option_c', document.getElementById('oC').value);
      fd.append('reponse_correcte', document.getElementById('rC').value);
      await apiRequest('/api/lecons', 'POST', fd, true);
      alert('Leçon ajoutée !'); window.location.reload();
    });
    load();
  </script>
</body>
</html>
