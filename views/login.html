<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><title>Brain Vision - Connexion</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body style="display:flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div class="card" style="width: 100%; max-width: 400px;">
    <h1 style="text-align: center; margin-bottom: 1.5rem; color: var(--accent);">BRAIN VISION</h1>
    <form id="loginForm">
      <input type="email" id="email" required placeholder="Adresse Email">
      <input type="password" id="password" required placeholder="Mot de passe">
      <button type="submit">Se connecter</button>
    </form>
    <p style="margin-top:1rem; text-align:center;"><a href="/register" style="color:var(--accent);">Créer un compte étudiant ou enseignant</a></p>
  </div>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await apiRequest('/api/auth/login', 'POST', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        if(res.success) window.location.href = `/${res.role}`;
      } catch(err) { alert(err.message); }
    });
  </script>
</body>
</html>
